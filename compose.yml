version: "3.9"

services:
  devopsdb:
    image: saiyaswanth76/automation:db
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.25"
      replicas: 1  # Reduced to 1 to prevent DB split-brain
    networks:
      - mynetwork
    volumes:
      - database:/data

  application:
    image: saiyaswanth76/automation:app
    ports:
      - "1111:8080"
    deploy:
      replicas: 3
    # depends_on:  # Commented out as Swarm ignores this
    #   - devopsdb
    networks:
      - mynetwork
    volumes:
      - appdata:/yash

networks:
  mynetwork:
    driver: overlay

volumes:
  database:
  appdata:
